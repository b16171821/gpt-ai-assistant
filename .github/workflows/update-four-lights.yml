name: Update Four Lights Scanner

on:
  workflow_dispatch:
  schedule:
    # UTC 07:40 = Taiwan 15:40, after TW market close.
    - cron: "40 7 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update-four-lights-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scripts/update_tw_stock_scanner.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.csv data/latest.json data/latest.csv data/latest_report.md
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Update four lights scan data"
          git pull --rebase --autostash origin main
          git push
