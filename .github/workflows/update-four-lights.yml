name: Update Four Lights Scanner

on:
  workflow_dispatch:
  schedule:
    # UTC 07:40 = Taiwan 15:40, after TW market close.
    - cron: "40 7 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scripts/update_tw_stock_scanner.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update four lights scan data"
          file_pattern: data/history.csv data/latest.json data/latest.csv
