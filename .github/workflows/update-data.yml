name: Update Stock Data

on:
  workflow_dispatch:
  schedule:
    # 台股收盤後更新：台灣時間 15:40，週一～週五
    - cron: '40 7 * * 1-5'
    # 美股收盤後更新：台灣時間 06:40，週二～週六
    - cron: '40 22 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pandas numpy twstock
      - name: Run scanners and follow-up updates
        run: |
          python scripts/update_tw_stock_scanner.py
          python scripts/update_us_stock_scanner.py
          python scripts/update_company_profiles.py
          python scripts/update_strategy_locks.py
          python scripts/update_strategy_snapshots.py
      - name: Commit data files
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add data
          git commit -m update-data || echo no-changes
          git push
