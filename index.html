<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>主升段交易決策系統</title><style>body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial,'Noto Sans TC',sans-serif;line-height:1.5}.wrap{max-width:1180px;margin:auto;padding:12px}h1{font-size:26px;margin:0 0 6px}h2{font-size:19px;margin:0 0 10px}.muted{color:#94a3b8}.bar{position:sticky;top:0;z-index:9;background:#020617;border:1px solid #334155;border-radius:12px;padding:10px;margin:10px 0;color:#fde68a;font-weight:900}.mode{background:#172554;border:1px solid #60a5fa;border-radius:12px;padding:10px;margin:10px 0}.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:12px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}.stock{background:#020617;border:1px solid #1f2937;border-radius:12px;padding:12px}.head{display:flex;justify-content:space-between;gap:8px}.name{font-weight:900;font-size:17px}.pill{border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;display:inline-block}.ENTRY_CONFIRMED,.HOLD{background:#166534}.TEST,.WATCH,.WAIT_BREAKOUT{background:#854d0e}.TAKE_PROFIT{background:#581c87}.STOP_LOSS,.CANCELLED,.FORBIDDEN{background:#7f1d1d}.kv{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.kv div{background:#0f172a;border:1px solid #1f2937;border-radius:9px;padding:7px;font-size:13px}.box{margin-top:8px;background:#111827;border:1px solid #243044;border-radius:9px;padding:9px;font-size:13px}.overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}.overview div{background:#020617;border:1px solid #334155;border-radius:10px;padding:8px}.overview b{font-size:21px}.btns{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:10px;background:#2563eb;color:white;padding:9px 11px;font-weight:800}.secondary{background:#374151}.empty{padding:12px;border:1px dashed #475569;border-radius:10px;color:#94a3b8}.red{color:#fca5a5}.ok{color:#86efac}.small{font-size:12px}.links{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}.links a{color:#bfdbfe;text-decoration:none;background:#1e293b;padding:6px 9px;border-radius:999px;font-size:13px}@media(max-width:720px){.wrap{padding:9px}h1{font-size:23px}.grid{grid-template-columns:1fr}.card{padding:10px}.btns{display:grid;grid-template-columns:1fr}button{width:100%}.overview{grid-template-columns:1fr 1fr}.head{align-items:flex-start}}</style></head><body><div class="wrap"><h1>主升段交易決策系統</h1><div class="muted">資料模式＋策略狀態追蹤｜盤中看狀態，收盤做確認</div><div class="links"><a href="#entry">正式進場</a><a href="#test">盤中試單</a><a href="#hold">續抱</a><a href="#profit">停利</a><a href="#cancel">取消</a><a href="#forbid">禁止追高</a></div><div class="bar">盤中看狀態，收盤做確認。進場等收盤，停利可看盤中目標。</div><div id="modeBox" class="mode">資料模式判斷中...</div><div class="card"><div class="head"><h2>今日總覽</h2><div class="btns"><button onclick="loadAll()">重新讀取</button><button class="secondary" onclick="location.href='data/latest_report.md'">台股報告</button><button class="secondary" onclick="location.href='data/us_latest_report.md'">美股報告</button></div></div><div class="grid"><div class="card"><h2>台股</h2><div id="twMeta" class="muted">讀取中...</div></div><div class="card"><h2>美股</h2><div id="usMeta" class="muted">讀取中...</div></div></div><h2>狀態總覽</h2><div id="ov" class="overview"></div></div><div id="entry" class="card"><h2><span class="pill ENTRY_CONFIRMED">今日正式進場</span> <span id="entryN" class="muted small"></span></h2><div id="entryList" class="grid"></div></div><div id="test" class="card"><h2><span class="pill TEST">盤中可試單</span> <span id="testN" class="muted small"></span></h2><div id="testList" class="grid"></div></div><div id="hold" class="card"><h2><span class="pill HOLD">持有續抱</span> <span id="holdN" class="muted small"></span></h2><div id="holdList" class="grid"></div></div><div id="profit" class="card"><h2><span class="pill TAKE_PROFIT">接近目標停利</span> <span id="profitN" class="muted small"></span></h2><div id="profitList" class="grid"></div></div><div id="cancel" class="card"><h2><span class="pill CANCELLED">策略取消</span> <span id="cancelN" class="muted small"></span></h2><div id="cancelList" class="grid"></div></div><div id="forbid" class="card"><h2><span class="pill FORBIDDEN">禁止追高</span> <span id="forbidN" class="muted small"></span></h2><div id="forbidList" class="grid"></div></div></div><script>let all=[],MEM='stageTrackV3',DATA_MODE='intradayMode';function num(x){return Number(x)||0}function f(x){return x??'-'}function vr(r){return num(r.volumeRatio)||num(r.volume)/Math.max(1,num(r.avgVolume20))}function pc(a,b){return b?(a-b)/b*100:999}function mem(){try{return JSON.parse(localStorage.getItem(MEM)||'{}')}catch(e){return{}}}function sav(o){localStorage.setItem(MEM,JSON.stringify(o))}function key(r){return(r.market||'')+'-'+(r.code||r.ticker||r.name)}function pad(x){return String(x).padStart(2,'0')}function twNow(){let d=new Date();return new Date(d.toLocaleString('en-US',{timeZone:'Asia/Taipei'}))}function fmt(d){return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())}function closeDate(){let d=twNow();return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' 14:30'}function isCloseMode(){let d=twNow(),day=d.getDay(),m=d.getHours()*60+d.getMinutes();if(day===0||day===6)return true;return m>=14*60+30||m<8*60+30}function renderMode(){let d=twNow(),close=isCloseMode();DATA_MODE=close?'closeMode':'intradayMode';modeBox.innerHTML=`資料模式：<b>${close?'收盤確認':'盤中即時'}</b><br>盤中更新時間：${fmt(d)}<br>收盤資料日期：${closeDate()}<br><span class="${close?'ok':'red'}">${close?'目前為收盤確認資料，可用於正式策略判斷。':'目前為盤中資料，僅供觀察，正式策略需等收盤確認。'}</span>`}function sn(s){return{WATCH:'觀察中',WAIT_BREAKOUT:'等突破',TEST:'盤中試單',ENTRY_CONFIRMED:'正式進場',HOLD:'續抱',TAKE_PROFIT:'分批停利',STOP_LOSS:'停損處理',CANCELLED:'策略取消',FORBIDDEN:'禁止追高'}[s]||s||'無紀錄'}function cn(c){return{UNCHANGED:'策略不變',UPGRADED:'策略升級',DOWNGRADED:'策略降級',CANCELLED:'策略取消'}[c]||c}function rank(s){return{STOP_LOSS:0,CANCELLED:0,WATCH:1,FORBIDDEN:1,WAIT_BREAKOUT:2,TEST:3,ENTRY_CONFIRMED:4,HOLD:5,TAKE_PROFIT:6}[s]||1}function cmp(o,n){if(DATA_MODE==='intradayMode')return'UNCHANGED';if(!o)return'UNCHANGED';if(n==='STOP_LOSS'||n==='CANCELLED')return'CANCELLED';return rank(n)>rank(o)?'UPGRADED':rank(n)<rank(o)?'DOWNGRADED':'UNCHANGED'}function decide(r,m,old){let c=num(r.close),neck=num(r.neckline),target=num(r.target),stop=num(r.stopLoss),entry=num(r.entryBreakout)||neck*1.02,dist=pc(c,neck),ok=!String(r.kline||r.stage||'').includes('長黑'),close=DATA_MODE==='closeMode';let s='WATCH',why='型態成形前，先觀察。';if(!close){if(target&&c>=target*.95){s='TAKE_PROFIT';why='盤中已接近目標區，持有者可分批停利。'}else if(stop&&c<=stop){s='STOP_LOSS';why='盤中跌破警戒，收盤若未站回需處理。'}else if(r.forbiddenChase||dist>5){s='FORBIDDEN';why='盤中遠離頸線，禁止追高。'}else if(c>=entry){s='TEST';why='盤中突破，等待收盤確認。'}else if(neck&&c>=neck*.98){s='WAIT_BREAKOUT';why='盤中接近頸線，只能觀察。'}}else{if(stop&&c<=stop){s='STOP_LOSS';why='收盤跌破停損或風險區。'}else if(target&&c>=target*.95){s='TAKE_PROFIT';why='收盤接近目標價95%以上。'}else if(old&&['ENTRY_CONFIRMED','HOLD','TEST'].includes(old)&&neck&&c<neck){s='CANCELLED';why='收盤跌回頸線下方，策略取消。'}else if(r.forbiddenChase||dist>5){s='FORBIDDEN';why='收盤距離頸線超過5%，空手不追。'}else if(c>=neck*1.02&&vr(r)>=2&&dist<=5&&ok&&r.strictOk){s='ENTRY_CONFIRMED';why='收盤站上頸線2%以上，量能達標。'}else if(old&&['ENTRY_CONFIRMED','HOLD'].includes(old)&&c>=neck){s='HOLD';why='收盤未跌破頸線，趨勢延續。'}else if(neck&&c>=neck*.98){s='WAIT_BREAKOUT';why='收盤接近頸線，等突破。'}}r.strategyStage=s;r.yesterdayStage=old||'WATCH';r.strategyChange=cmp(old,s);r.changeReason=why;r.distanceFromNecklinePct=dist;r.finalCommand={WATCH:'空手等確認',WAIT_BREAKOUT:'空手等確認',TEST:'可小部位試單',ENTRY_CONFIRMED:'正式進場',HOLD:'持有者續抱，空手者不追',TAKE_PROFIT:'已到目標，分批停利',STOP_LOSS:'跌破風險區，出場',CANCELLED:'策略取消，移出觀察',FORBIDDEN:'持有者續抱，空手者不追'}[s];r.holderAction=s==='TAKE_PROFIT'?'分批停利':s==='STOP_LOSS'?'盤中警戒，收盤未站回需處理':s==='CANCELLED'?'出場處理':s==='HOLD'||s==='FORBIDDEN'?'續抱，看目標':'依確認條件處理';r.emptyAction=['ENTRY_CONFIRMED'].includes(s)?'收盤確認後才可規劃':s==='TEST'?'只可小部位20%～30%':'不追高，等買點';r.nextPoint=`站上 ${f(r.entryBreakout)}：策略升級<br>跌破 ${f(r.neckline)}：策略降級<br>接近 ${f(r.target)}：分批停利<br>跌破 ${f(r.stopLoss)}：出場`;return r}function line(r){return`【今日策略追蹤】\n\n股票：${r.name||''} ${r.code||r.ticker||''}\n資料模式：${DATA_MODE==='closeMode'?'收盤確認':'盤中即時'}\n昨日狀態：${sn(r.yesterdayStage)}\n今日狀態：${sn(r.strategyStage)}\n策略變化：${cn(r.strategyChange)}\n持有者：${r.holderAction}\n空手者：${r.emptyAction}\n下一個判斷點：\n${r.nextPoint.replaceAll('<br>','\n')}\n\n提醒：\n有確認才進，沒確認不追。\n持有跟新進是兩件事。`}async function cp(i){try{await navigator.clipboard.writeText(line(all[i]));document.getElementById('c'+i).textContent='已複製';setTimeout(()=>document.getElementById('c'+i).textContent='',1500)}catch(e){alert(line(all[i]))}}function card(r,i){let code=r.code||r.ticker||'';return`<div class="stock"><div class="head"><div><div class="name">${r.name||code} ${code}</div><div class="muted small">${r.marketName}｜現價 ${f(r.close)}｜${f(r.date)}｜${DATA_MODE==='closeMode'?'收盤確認':'盤中即時'}</div></div><span class="pill ${r.strategyStage}">${sn(r.strategyStage)}</span></div><div class="box"><b>資料來源時間：</b>${DATA_MODE==='closeMode'?closeDate():fmt(twNow())}<br><b>昨日狀態：</b>${sn(r.yesterdayStage)}<br><b>今日狀態：</b>${sn(r.strategyStage)}<br><b>策略變化：</b>${cn(r.strategyChange)}<br><b>變化原因：</b>${r.changeReason}</div><div class="box"><b>會員最終指令：</b>${r.finalCommand}<br><b>持有者：</b>${r.holderAction}<br><b>空手者：</b>${r.emptyAction}</div><div class="kv"><div>頸線<br><b>${f(r.neckline)}</b></div><div>突破<br><b>${f(r.entryBreakout)}</b></div><div>停損<br><b>${f(r.stopLoss)}</b></div><div>目標<br><b>${f(r.target)}</b></div></div><div class="box"><b>下一個判斷點：</b><br>${r.nextPoint}</div><button onclick="cp(${i})">複製 LINE 訊息</button><span id="c${i}" class="small ok"></span></div>`}function put(id,nid,a){document.getElementById(nid).textContent=a.length+' 檔';document.getElementById(id).innerHTML=a.length?a.map(x=>card(x,x._i)).join(''):'<div class="empty">目前沒有符合此分類的標的。</div>'}function meta(m,p){if(m&&m.err)return`<span class="red">讀取失敗</span><br>查無該日資料<br>目前嘗試讀取檔案：${p}`;return`資料來源時間：${m.updatedAt||m.updatedAtTW||'-'}<br>掃描：${m.scanUniverse||m.totalMaster||m.totalWatchlist||m.totalAnalyzed||'-'} 檔｜有效：${m.totalAnalyzed||0} 檔`}async function j(p){let r=await fetch(p+'?ts='+Date.now());if(!r.ok)throw Error(p);return r.json()}async function loadAll(){renderMode();let tw,us,M=mem(),N={};try{tw=await j('data/latest.json')}catch(e){tw={meta:{err:true},stocks:[]}}try{us=await j('data/us_latest.json')}catch(e){us={meta:{err:true},stocks:[]}}twMeta.innerHTML=meta(tw.meta,'data/latest.json');usMeta.innerHTML=meta(us.meta,'data/us_latest.json');all=[];(tw.stocks||[]).forEach(r=>{r.market='TW';r.marketName='台股';all.push(decide(r,'tw',M['TW-'+(r.code||r.ticker||r.name)]?.stage))});(us.stocks||[]).forEach(r=>{r.market='US';r.marketName='美股';all.push(decide(r,'us',M['US-'+(r.code||r.ticker||r.name)]?.stage))});all.forEach((r,i)=>{r._i=i;N[key(r)]={stage:r.strategyStage}});if(DATA_MODE==='closeMode')sav(N);let c=s=>all.filter(r=>r.strategyStage===s).length;ov.innerHTML=`<div>今日正式進場<br><b>${c('ENTRY_CONFIRMED')}</b></div><div>盤中可試單<br><b>${c('TEST')}</b></div><div>持有續抱<br><b>${c('HOLD')}</b></div><div>接近目標停利<br><b>${c('TAKE_PROFIT')}</b></div><div>策略取消<br><b>${c('CANCELLED')+c('STOP_LOSS')}</b></div><div>禁止追高<br><b>${c('FORBIDDEN')}</b></div>`;put('entryList','entryN',all.filter(r=>r.strategyStage==='ENTRY_CONFIRMED').slice(0,10));put('testList','testN',all.filter(r=>r.strategyStage==='TEST').slice(0,10));put('holdList','holdN',all.filter(r=>r.strategyStage==='HOLD').slice(0,10));put('profitList','profitN',all.filter(r=>r.strategyStage==='TAKE_PROFIT').slice(0,10));put('cancelList','cancelN',all.filter(r=>['STOP_LOSS','CANCELLED'].includes(r.strategyStage)).slice(0,10));put('forbidList','forbidN',all.filter(r=>r.strategyStage==='FORBIDDEN').slice(0,10))}loadAll()</script></body></html>
