<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>主升段觀察系統</title><style>body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial,'Noto Sans TC',sans-serif;line-height:1.5}.wrap{max-width:1180px;margin:auto;padding:12px}h1{font-size:26px;margin:0 0 6px}h2{font-size:19px;margin:0 0 10px}.muted{color:#94a3b8}.bar{position:sticky;top:0;z-index:9;background:#020617;border:1px solid #334155;border-radius:12px;padding:10px;margin:10px 0;color:#fde68a;font-weight:900}.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:12px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:10px}.stock{background:#020617;border:1px solid #1f2937;border-radius:12px;padding:12px}.head{display:flex;justify-content:space-between;gap:8px}.name{font-weight:900;font-size:17px}.pill{border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;display:inline-block}.hot{background:#166534}.okp{background:#1d4ed8}.wait{background:#854d0e}.hold{background:#166534}.profit{background:#581c87}.kv{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.kv div,.box{background:#111827;border:1px solid #243044;border-radius:9px;padding:8px;font-size:13px}.box{margin-top:8px}.strategy{border-color:#365314;background:#0f1f12}.strategy b{color:#bbf7d0}.btns,.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs{margin:10px 0}.tabs button{background:#374151}.tabs button.active{background:#16a34a}button{border:0;border-radius:10px;background:#2563eb;color:white;padding:9px 11px;font-weight:800}.secondary{background:#374151}.empty{padding:12px;border:1px dashed #475569;border-radius:10px;color:#94a3b8}.red{color:#fca5a5}.ok{color:#86efac}.small{font-size:12px}.links{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}.links a{color:#bfdbfe;text-decoration:none;background:#1e293b;padding:6px 9px;border-radius:999px;font-size:13px}.checks{display:grid;gap:3px}.details{margin-top:8px}.details summary{cursor:pointer;color:#bfdbfe}.topline{font-size:14px;color:#cbd5e1}.summarygrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}@media(max-width:720px){.wrap{padding:9px}h1{font-size:23px}.grid,.summarygrid{grid-template-columns:1fr}.card{padding:10px}.btns{display:grid;grid-template-columns:1fr}button{width:100%}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr}.head{align-items:flex-start}.kv{display:none}.details .kv{display:grid}}</style></head><body><div class="wrap"><h1>主升段觀察系統</h1><div class="muted">只篩選適合策略的標的｜先看成形條件，再看階段</div><div class="links"><a href="#main">主升段觀察</a><a href="#forming">即將成形</a><a href="#pullback">回踩確認</a><a href="#hold">續抱</a><a href="#profit">停利</a></div><div class="bar">主升段觀察系統｜先看成形條件，再看階段。價格只是參考，狀態才是決策；進場等確認，停利看目標。</div><div class="card"><div class="head"><h2>今日總覽</h2><div class="btns"><button onclick="loadAll()">重新讀取</button><button class="secondary" onclick="copySummary()">複製今日總結</button></div></div><div class="tabs"><button id="tabAll" class="active" onclick="setMarket('全部')">全部</button><button id="tabTW" onclick="setMarket('台股')">台股</button><button id="tabUS" onclick="setMarket('美股')">美股</button></div><div class="summarygrid"><div class="card"><h2>台股</h2><div id="twMeta" class="muted">讀取中...</div></div><div class="card"><h2>美股</h2><div id="usMeta" class="muted">讀取中...</div></div></div></div><section id="main" class="card"><h2><span class="pill hot">主升段觀察股</span> <span id="mainN" class="muted small"></span></h2><div id="mainList" class="grid"></div></section><section id="forming" class="card"><h2><span class="pill okp">即將成形</span> <span id="formingN" class="muted small"></span></h2><div id="formingList" class="grid"></div></section><section id="pullback" class="card"><h2><span class="pill wait">回踩確認中</span> <span id="pullbackN" class="muted small"></span></h2><div id="pullbackList" class="grid"></div></section><section id="hold" class="card"><h2><span class="pill hold">主升段續抱</span> <span id="holdN" class="muted small"></span></h2><div id="holdList" class="grid"></div></section><section id="profit" class="card"><h2><span class="pill profit">接近目標停利</span> <span id="profitN" class="muted small"></span></h2><div id="profitList" class="grid"></div></section></div><script>let all=[],currentMarket='全部';function num(x){let m=String(x??'').replace(/,/g,'').match(/-?\d+(\.\d+)?/);return m?Number(m[0]):0}function f(x){return x||x===0?x:'-'}function fmt(x){return x?Number(x).toFixed(2).replace(/\.00$/,''):'-'}function vr(r){return num(r.volumeRatio)||num(r.volume)/Math.max(1,num(r.avgVolume20))}function pct(a,b){return b?(a-b)/b*100:999}function yn(x){return x?'完成':'待確認'}function plan(r){let c=num(r.close),neck=num(r.neckline),entry=num(r.entryBreakout)||neck*1.02,pull=num(r.entryPullback)||neck,stop=num(r.stopLoss),target=num(r.target),lo=0,hi=0;if(pull&&entry){lo=Math.min(pull,entry);hi=Math.max(pull,entry)}else if(neck){lo=neck;hi=neck*1.05}else if(c){lo=c*.98;hi=c*1.02}return{lo,hi,stop,target}}function make(r,mk){let c=num(r.close),neck=num(r.neckline),entry=num(r.entryBreakout)||neck*1.02,target=num(r.target),stop=num(r.stopLoss),dist=pct(c,neck),vol=vr(r),txt=String(r.pattern||r.stage||r.status||''),trend=!!(r.trend||r.strictOk||num(r.score)>=3),shape=/箱|W|旗|三角|突破|成形|回踩/.test(txt),volume=vol>=1.5||r.fund||r.volumeOk,position=neck&&(Math.abs(dist)<=5||c>=neck),risk=neck&&Math.abs(dist)<=8&&stop>0,score=[trend,shape,volume,position,risk].filter(Boolean).length;if(score<3)return null;let stage='接近成形',status='觀察',next='等收盤站穩頸線',holder='守風險區',empty='等收盤確認',riskText='未確認前不追高';if(target&&c>=target*.95){stage='接近滿足點';status='分批停利';next='接近目標，持有者分批停利';holder='續抱者分批停利';empty='不追，等新的整理區'}else if(c>neck&&dist>5){stage='主升段進行中';status='續抱';next='持有者續抱，空手者不追';holder='續抱，接近目標分批停利';empty='不追，等回踩不破';riskText='距離頸線過遠，不適合新進'}else if(c>=entry&&r.strictOk){stage='突破測試';status='等確認';next='等收盤確認與隔日不跌破頸線';holder='守頸線與停損';empty='等收盤確認'}else if(c>=neck*.98&&c<entry){stage='即將成形';status='等確認';next='等成交量放大與站穩頸線';holder='守風險區';empty='等突破確認'}else if(String(r.stage||'').includes('回踩')){stage='回踩確認';status='觀察';next='等回踩不破';holder='續抱觀察支撐';empty='等回踩不破'}if(stop&&c<=stop){stage='結構失敗';status='取消觀察';next='跌破風險區，取消觀察';holder='跌破風險區，出場';empty='暫不觀察';riskText='結構明顯轉弱'}r.marketName=mk;r.formedScore=score;r.formedLabel=score+'/5';r.highFocus=score>=4;r.uptrendStage=stage;r.todayStatus=status;r.nextAction=next;r.holderAction=holder;r.emptyAction=empty;r.riskText=riskText;r.checks={trend,shape,volume,position,risk};r.plan=plan(r);return r}function line(r){let c=r.checks,p=r.plan;return`【主升段觀察股】\n\n股票：${r.name||''} ${r.code||r.ticker||''}\n主升段成形：${r.formedLabel}\n目前階段：${r.uptrendStage}\n今日狀態：${r.todayStatus}\n\n主升段策略：\n買入範圍：${fmt(p.lo)}～${fmt(p.hi)}\n停損：${fmt(p.stop)}\n目標價：${fmt(p.target)}\n\n成形條件：\n1. 趨勢：${yn(c.trend)}\n2. 型態：${yn(c.shape)}\n3. 量能：${yn(c.volume)}\n4. 位置：${yn(c.position)}\n5. 風控：${yn(c.risk)}\n\n持有者：${r.holderAction}\n空手者：${r.emptyAction}\n下一步：${r.nextAction}\n風險提醒：${r.riskText}\n\n提醒：\n買入範圍不是叫你直接追價，需等主升段條件確認。\n本內容為個人觀察與交易紀錄分享，不構成投資建議。`}async function cp(i){try{await navigator.clipboard.writeText(line(all[i]));document.getElementById('c'+i).textContent='已複製';setTimeout(()=>document.getElementById('c'+i).textContent='',1500)}catch(e){alert(line(all[i]))}}function card(r,i){let code=r.code||r.ticker||'',cls=r.highFocus?'hot':'okp',p=r.plan;return`<article class="stock"><div class="head"><div><div class="name">${r.name||code} ${code}</div><div class="topline">主升段階段：${r.uptrendStage}</div><div class="muted small">${r.marketName}｜${r.date||'-'}｜現價 ${f(r.close)}</div></div><span class="pill ${cls}">${r.highFocus?'高關注':'可觀察'}</span></div><div class="box"><b>主升段成形：</b>${r.formedLabel}<br><b>今日狀態：</b>${r.todayStatus}<br><b>下一步：</b>${r.nextAction}</div><div class="box strategy"><b>主升段策略</b><br>買入範圍：${fmt(p.lo)}～${fmt(p.hi)}<br>停損：${fmt(p.stop)}<br>目標價：${fmt(p.target)}</div><div class="box"><b>持有者：</b>${r.holderAction}<br><b>空手者：</b>${r.emptyAction}</div><details class="details"><summary>查看成形條件與風險</summary><div class="checks"><span>1. 趨勢：${yn(r.checks.trend)}</span><span>2. 型態：${yn(r.checks.shape)}</span><span>3. 量能：${yn(r.checks.volume)}</span><span>4. 位置：${yn(r.checks.position)}</span><span>5. 風控：${yn(r.checks.risk)}</span></div><div class="kv"><div>頸線<br><b>${f(r.neckline)}</b></div><div>突破價<br><b>${f(r.entryBreakout)}</b></div><div>回踩價<br><b>${f(r.entryPullback)}</b></div><div>量比<br><b>${vr(r).toFixed(2)}倍</b></div></div><div class="box"><b>風險提醒：</b>${r.riskText}</div></details><button onclick="cp(${i})">複製 LINE 訊息</button><span id="c${i}" class="small ok"></span></article>`}function list(){return currentMarket==='全部'?all:all.filter(x=>x.marketName===currentMarket)}function put(id,nid,a){document.getElementById(nid).textContent=a.length+' 檔';document.getElementById(id).innerHTML=a.length?a.map(x=>card(x,x._i)).join(''):'<div class="empty">目前沒有符合此分類的標的。</div>'}function render(){let rows=list();put('mainList','mainN',rows.filter(x=>x.formedScore>=4&&['突破測試','主升段進行中'].includes(x.uptrendStage)).slice(0,10));put('formingList','formingN',rows.filter(x=>x.uptrendStage==='即將成形').slice(0,10));put('pullbackList','pullbackN',rows.filter(x=>x.uptrendStage==='回踩確認').slice(0,10));put('holdList','holdN',rows.filter(x=>x.uptrendStage==='主升段進行中').slice(0,10));put('profitList','profitN',rows.filter(x=>x.uptrendStage==='接近滿足點').slice(0,10))}function setMarket(m){currentMarket=m;tabAll.classList.toggle('active',m==='全部');tabTW.classList.toggle('active',m==='台股');tabUS.classList.toggle('active',m==='美股');render()}function meta(m,p,rows){if(m&&m.err)return`<span class="red">資料讀取失敗</span><br>目前嘗試讀取檔案：${p}<br>錯誤原因：${m.err}`;let high=rows.filter(x=>x.highFocus).length,profit=rows.filter(x=>x.uptrendStage==='接近滿足點').length;return`更新時間：${m.updatedAt||m.updatedAtTW||'-'}<br>掃描：${m.scanUniverse||m.totalMaster||m.totalWatchlist||m.totalAnalyzed||'-'}｜有效：${m.totalAnalyzed||rows.length||0}<br>主升段觀察：${rows.length}｜高關注：${high}｜接近目標：${profit}`}async function j(p){let r=await fetch(p+'?ts='+Date.now());if(!r.ok)throw Error(r.status);return r.json()}async function loadAll(){let tw,us,twRows=[],usRows=[];try{tw=await j('data/latest.json')}catch(e){tw={meta:{err:e.message},stocks:[]}}try{us=await j('data/us_latest.json')}catch(e){us={meta:{err:e.message},stocks:[]}}twRows=(tw.stocks||[]).map(x=>make(x,'台股')).filter(Boolean);usRows=(us.stocks||[]).map(x=>make(x,'美股')).filter(Boolean);twMeta.innerHTML=meta(tw.meta,'data/latest.json',twRows);usMeta.innerHTML=meta(us.meta,'data/us_latest.json',usRows);all=[...twRows,...usRows].sort((a,b)=>b.formedScore-a.formedScore);all.forEach((x,i)=>x._i=i);render()}async function copySummary(){let rows=list(),t=rows.filter(x=>x.marketName==='台股'),u=rows.filter(x=>x.marketName==='美股');let msg=`【今日主升段策略總結】\n\n目前顯示：${currentMarket}\n\n台股：主升段觀察 ${t.length} 檔｜高關注 ${t.filter(x=>x.highFocus).length} 檔｜接近目標 ${t.filter(x=>x.uptrendStage==='接近滿足點').length} 檔\n美股：主升段觀察 ${u.length} 檔｜高關注 ${u.filter(x=>x.highFocus).length} 檔｜接近目標 ${u.filter(x=>x.uptrendStage==='接近滿足點').length} 檔\n\n提醒：持有者看續抱，空手者看買點。`;try{await navigator.clipboard.writeText(msg);alert('已複製今日總結')}catch(e){alert(msg)}}loadAll();</script></body></html>
