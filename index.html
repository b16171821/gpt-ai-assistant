<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>股票策略儀表板｜台股＋美股</title>
  <style>
    *{box-sizing:border-box}
    :root{color-scheme:dark;--bg:#0f172a;--panel:#111827;--panel-2:#020617;--line:#334155;--line-soft:#1f2937;--text:#e5e7eb;--muted:#94a3b8;--head:#1e293b;--blue:#2563eb;--button:#374151}
    body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-text-size-adjust:100%}
    .wrap{width:min(100%,1224px);margin:auto;padding:22px}
    .hero{padding:6px 0 4px}
    h1{font-size:clamp(26px,3vw,34px);line-height:1.18;margin:0 0 8px;letter-spacing:0}
    h2{margin:0 0 12px;font-size:20px;line-height:1.28}
    h3{margin:0 0 8px;font-size:17px;line-height:1.3}
    .muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;align-items:start}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin:14px 0;box-shadow:0 10px 20px rgba(0,0,0,.15)}
    .summary-card{margin:0;background:#0b1220}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:13px;line-height:1.2;background:#334155;white-space:nowrap}
    .ok{background:#166534}.warn{background:#854d0e}.bad{background:#7f1d1d}.blue{background:#1d4ed8}
    .table-scroll{width:100%;overflow:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;margin-top:10px;min-width:780px}
    th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px;vertical-align:top}
    th{color:#cbd5e1;background:var(--head);position:sticky;top:0}
    .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
    button{border:0;border-radius:10px;background:var(--blue);color:white;padding:10px 12px;font-weight:700;cursor:pointer;min-height:42px}
    button.secondary{background:var(--button)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .small{font-size:13px}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .empty{padding:14px;background:var(--panel-2);border:1px dashed #475569;border-radius:12px;color:var(--muted)}
    .signal{font-weight:700}.green{color:#86efac}.yellow{color:#fde68a}.red{color:#fca5a5}
    .guide{max-width:920px}

    @media (max-width:720px){
      body{background:#0b1120}
      .wrap{padding:14px 12px 22px}
      .hero{padding-top:2px}
      h1{font-size:25px}
      h2{font-size:18px;margin-bottom:10px}
      h3{font-size:16px}
      .grid{grid-template-columns:1fr;gap:10px}
      .card{border-radius:10px;padding:14px;margin:10px 0;box-shadow:0 8px 16px rgba(0,0,0,.12)}
      .summary-card{margin:0}
      .actions{display:grid;grid-template-columns:1fr;gap:8px;width:100%}
      .actions button{width:100%;font-size:15px}
      .section-title{align-items:flex-start}
      .section-title h2{max-width:calc(100% - 76px)}
      .pill{font-size:12px;padding:5px 9px}
      .table-scroll{overflow:visible}
      table{display:block;min-width:0;margin-top:8px}
      thead{display:none}
      tbody,tr,td{display:block;width:100%}
      tr{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;margin:10px 0;padding:8px 10px}
      td{display:grid;grid-template-columns:76px minmax(0,1fr);gap:10px;border-bottom:1px solid var(--line-soft);padding:9px 0;font-size:14px;overflow-wrap:anywhere}
      td:last-child{border-bottom:0}
      td::before{content:attr(data-label);color:var(--muted);font-size:12px;font-weight:700;line-height:1.5}
      .small{font-size:12px}
      .empty{padding:12px}
      .guide{font-size:13px}
    }

    @media (min-width:721px){
      .card:first-of-type .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>股票策略儀表板</h1>
      <div class="muted">台股＋美股｜四燈＋型態＋頸線＋進場＋停損｜只做觀察，不構成買賣建議</div>
    </div>

    <div class="card">
      <div class="section-title">
        <h2>今日總覽</h2>
        <div class="actions">
          <button onclick="loadAll()">重新讀取</button>
          <button class="secondary" onclick="location.href='data/latest_report.md'">台股報告</button>
          <button class="secondary" onclick="location.href='data/us_latest_report.md'">美股報告</button>
        </div>
      </div>
      <div class="grid">
        <div class="card summary-card"><h3>台股</h3><div id="twMeta" class="muted">讀取中...</div></div>
        <div class="card summary-card"><h3>美股</h3><div id="usMeta" class="muted">讀取中...</div></div>
      </div>
    </div>

    <div class="grid">
      <div class="card"><div class="section-title"><h2>台股嚴格候選</h2><span id="twStrictBadge" class="pill">-</span></div><div id="twStrict"></div></div>
      <div class="card"><div class="section-title"><h2>美股嚴格候選</h2><span id="usStrictBadge" class="pill">-</span></div><div id="usStrict"></div></div>
    </div>

    <div class="grid">
      <div class="card"><div class="section-title"><h2>台股預備單</h2><span class="pill warn">接近成形</span></div><div id="twWatch"></div></div>
      <div class="card"><div class="section-title"><h2>美股預備單</h2><span class="pill warn">接近成形</span></div><div id="usWatch"></div></div>
    </div>

    <div class="card">
      <h2>怎麼看這一頁</h2>
      <div class="small muted guide">
        先看「嚴格候選」。沒有嚴格候選，就只看預備單，不要追。<br>
        strictOk = true 才代表條件比較完整；forbiddenChase = true 就禁止追高，只能等回踩。<br>
        進場前仍要確認：收盤站上頸線至少 2%、成交量大於 20 日均量 2 倍、不可長上影、隔日不跌破頸線。
      </div>
    </div>
  </div>

<script>
function clsByStatus(row){if(row.strictOk)return'ok';if(row.forbiddenChase)return'bad';return'warn'}
function signalText(row){if(row.strictOk)return'<span class="signal green">可研究進場</span>';if(row.forbiddenChase)return'<span class="signal red">禁止追高</span>';return'<span class="signal yellow">等確認</span>'}
function table(rows,market){if(!rows||rows.length===0)return'<div class="empty">目前沒有符合條件標的。</div>';const head='<thead><tr><th>股票</th><th>訊號</th><th>現價</th><th>型態</th><th>進場/停損</th><th>策略</th></tr></thead>';const body=rows.map(r=>`<tr><td data-label="股票"><b>${r.name||''}</b><br><span class="mono">${r.code||r.ticker||''}</span><br><span class="muted small">${r.score||0}/4｜${r.winRate||'-'}勝率</span></td><td data-label="訊號">${signalText(r)}<br><span class="pill ${clsByStatus(r)}">${r.status||''}</span></td><td data-label="現價">${r.close||'-'} ${market==='us'?'USD':''}<br><span class="muted small">${r.date||''}</span></td><td data-label="型態">${r.pattern||'-'}<br><span class="muted small">${r.stage||'-'}</span><br><span class="muted small">頸線 ${r.neckline||'-'}｜目標 ${r.target||'-'}</span></td><td data-label="進出">突破：${r.entryBreakout||'-'}<br>回踩：${r.entryPullback||'-'}<br>停損：${r.stopLoss||'-'}<br><span class="muted small">追價 ${r.chaseRangeLow||'-'}～${r.chaseRangeHigh||'-'}</span></td><td data-label="策略">${r.planStatus||''}<br><span class="muted small">${r.reason||''}</span></td></tr>`).join('');return`<div class="table-scroll"><table>${head}<tbody>${body}</tbody></table></div>`}
function topRows(stocks,strictOnly,limit=5){return (stocks||[]).filter(r=>strictOnly?r.strictOk:(r.score>=3&&!r.strictOk)).slice(0,limit)}
async function loadJson(path){const res=await fetch(path+'?ts='+Date.now());if(!res.ok)throw new Error(path+' not found');return res.json()}
function renderTw(payload){const m=payload.meta||{},s=payload.stocks||[];twMeta.innerHTML=`更新：${m.updatedAt||'-'}<br>掃描：${m.totalAnalyzed||0} 檔｜3燈以上：${m.qualified3Plus||0}｜4燈：${m.qualified4||0}｜嚴格候選：${m.strictCandidates||0}`;twStrictBadge.textContent=`${m.strictCandidates||0} 檔`;twStrict.innerHTML=table(topRows(s,true,5),'tw');twWatch.innerHTML=table(topRows(s,false,5),'tw')}
function renderUs(payload){const m=payload.meta||{},s=payload.stocks||[],market=payload.market||{};usMeta.innerHTML=`美東：${m.updatedAtET||'-'}<br>台灣：${m.updatedAtTW||'-'}<br>市場：${m.sessionStatus||'-'}｜${market.marketState||'-'}｜${market.suggestion||'-'}<br>掃描：${m.totalAnalyzed||0} 檔｜3分以上：${m.qualified3Plus||0}｜嚴格候選：${m.strictCandidates||0}`;usStrictBadge.textContent=`${m.strictCandidates||0} 檔`;usStrict.innerHTML=table(topRows(s,true,5),'us');usWatch.innerHTML=table(topRows(s,false,5),'us')}
async function loadAll(){twMeta.textContent='讀取中...';usMeta.textContent='讀取中...';try{renderTw(await loadJson('data/latest.json'))}catch(e){twMeta.innerHTML='<span class="red">台股資料尚未產生，請先跑 Update Four Lights Scanner。</span>'}try{renderUs(await loadJson('data/us_latest.json'))}catch(e){usMeta.innerHTML='<span class="red">美股資料尚未產生，請先跑 Update US Four Lights Scanner。</span>'}}
loadAll();
</script>
</body>
</html>
