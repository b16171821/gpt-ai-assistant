<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>主升段交易決策系統</title><style>body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial,'Noto Sans TC',sans-serif;line-height:1.55}.wrap{max-width:1180px;margin:auto;padding:14px}h1{margin:0 0 6px;font-size:28px}h2{font-size:20px;margin:0 0 10px}.muted{color:#94a3b8}.bar{position:sticky;top:0;z-index:5;background:#020617;border:1px solid #334155;border-radius:12px;padding:10px;margin:10px 0;color:#fde68a;font-weight:900}.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}.stock{background:#020617;border:1px solid #1f2937;border-radius:12px;padding:12px}.head{display:flex;justify-content:space-between;gap:8px}.name{font-size:17px;font-weight:900}.pill{display:inline-block;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:800}.ENTRY,.HOLD{background:#166534}.TEST,.WATCH{background:#854d0e}.TAKE_PROFIT{background:#581c87}.STOP_LOSS,.FORBIDDEN{background:#7f1d1d}.kv{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}.kv div{background:#0f172a;border:1px solid #1f2937;border-radius:9px;padding:7px;font-size:13px}.tip{margin-top:9px;color:#cbd5e1}.strategy{margin-top:9px;background:#111827;border:1px solid #243044;border-radius:9px;padding:9px;font-size:13px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}button{border:0;border-radius:10px;background:#2563eb;color:white;padding:10px 12px;font-weight:800}.secondary{background:#374151}.empty{padding:12px;border:1px dashed #475569;border-radius:10px;color:#94a3b8}.red{color:#fca5a5}.ok{color:#86efac}.warn{color:#fde68a}.small{font-size:12px}.links{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.links a{color:#bfdbfe;text-decoration:none;background:#1e293b;padding:6px 10px;border-radius:999px;font-size:13px}@media(max-width:720px){.wrap{padding:9px}h1{font-size:23px}.card{padding:10px;margin:8px 0}.grid{grid-template-columns:1fr}.kv div{font-size:12px}.btns{display:grid;grid-template-columns:1fr}button{width:100%}}</style></head><body><div class="wrap"><h1>主升段交易決策系統</h1><div class="muted">台股＋美股｜進場、試單、回踩、停利、停損</div><div class="links"><a href="#entry">正式進場</a><a href="#test">盤中試單</a><a href="#watch">等回踩</a><a href="#profit">分批停利</a><a href="#forbidden">禁止追高</a></div><div class="bar">進場等確認，停利看目標。未確認不追高，跌破風險區就處理。</div><div class="card"><div class="head"><h2>今日總覽</h2><div class="btns"><button onclick="loadAll()">重新讀取</button><button class="secondary" onclick="location.href='data/latest_report.md'">台股報告</button><button class="secondary" onclick="location.href='data/us_latest_report.md'">美股報告</button></div></div><div class="grid"><div class="card"><h2>台股</h2><div id="twMeta" class="muted">讀取中...</div></div><div class="card"><h2>美股</h2><div id="usMeta" class="muted">讀取中...</div></div></div></div><div id="entry" class="card"><h2><span class="pill ENTRY">今日可正式進場</span> <span id="entryN" class="muted small"></span></h2><div id="entryList" class="grid"></div></div><div id="test" class="card"><h2><span class="pill TEST">盤中可小試單</span> <span id="testN" class="muted small"></span></h2><div id="testList" class="grid"></div></div><div id="watch" class="card"><h2><span class="pill WATCH">等回踩觀察</span> <span id="watchN" class="muted small"></span></h2><div id="watchList" class="grid"></div></div><div id="profit" class="card"><h2><span class="pill TAKE_PROFIT">已到目標可停利</span> <span id="profitN" class="muted small"></span></h2><div id="profitList" class="grid"></div></div><div id="forbidden" class="card"><h2><span class="pill FORBIDDEN">禁止追高 / 取消觀察</span> <span id="forbiddenN" class="muted small"></span></h2><div id="forbiddenList" class="grid"></div></div><div class="card"><h2>怎麼看</h2><div class="muted small">正式進場要等收盤確認；盤中突破只能小部位；距離頸線超過 5% 不追；碰目標區可分批停利；跌破停損先處理風險。</div></div></div><script>let all=[];function n(v){let m=String(v??'').replace(/,/g,'').match(/-?\d+(\.\d+)?/);return m?Number(m[0]):0}function v(x){return x??'-'}function vol(r){return n(r.volumeRatio)||((n(r.volume)&&n(r.avgVolume20))?n(r.volume)/n(r.avgVolume20):0)}function pct(a,b){return b?((a-b)/b*100):999}function closed(m,d){let now=new Date(),today=now.toISOString().slice(0,10);if(d&&d<today)return true;let tz=m==='us'?'America/New_York':'Asia/Taipei',p=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false,weekday:'short'}).formatToParts(now),h=0,mi=0,w='';p.forEach(x=>{if(x.type==='hour')h=+x.value;if(x.type==='minute')mi=+x.value;if(x.type==='weekday')w=x.value});if(w==='Sat'||w==='Sun')return true;let t=h*60+mi;return m==='us'?t>=960:t>=815}function decide(r,m){let c=n(r.close),neck=n(r.neckline),target=n(r.target),stop=n(r.stopLoss),entry=n(r.entryBreakout)||neck*1.02,dist=pct(c,neck),vr=vol(r),isClosed=closed(m,r.date),txt=String(r.kline||r.stage||r.status||''),noBad=!/長上影|長黑/.test(txt);r.distanceFromNecklinePct=dist;if(stop&&c<=stop){r.tradeLevel='STOP_LOSS';r.todayAction='跌破停損，出場';r.tip='跌破風險區，先處理風險，不凹單。'}else if(target&&c>=target*.95){r.tradeLevel='TAKE_PROFIT';r.todayAction='分批停利';r.tip='已接近滿足點，建議分批停利。進場等收盤確認，停利碰目標區可盤中分批出。'}else if(r.forbiddenChase||dist>5){r.tradeLevel='FORBIDDEN';r.todayAction='禁止追高，等回踩';r.tip='已遠離頸線，不適合新進。持有者可續抱，空手者等回踩。'}else if(!isClosed&&c>=entry){r.tradeLevel='TEST';r.todayAction='可小部位試單';r.tip='盤中突破，等待收盤確認。只適合小部位，20%～30%。收盤未站穩，不留正式倉位。'}else if(isClosed&&c>=neck*1.02&&vr>=2&&noBad&&dist<=5&&r.strictOk){r.tradeLevel='ENTRY';r.todayAction='正式進場';r.tip='收盤站上頸線至少 2%，量能達標，位置合理；隔日仍不可跌破頸線。'}else if(c>neck&&r.strictOk){r.tradeLevel='HOLD';r.todayAction='續抱';r.tip='條件仍在，續抱但不亂加碼，跌破頸線或停損價要處理。'}else{r.tradeLevel='WATCH';r.todayAction='等確認，不進場';r.tip='等待突破確認或回踩不破，不提前追價。'}return r}function lname(l){return{ENTRY:'今日可正式進場',TEST:'盤中可小試單',WATCH:'等回踩觀察',HOLD:'續抱',TAKE_PROFIT:'已到目標可停利',STOP_LOSS:'停損 / 取消',FORBIDDEN:'禁止追高'}[l]||l}function line(r){return`【今日觀察股】\n股票：${r.name||''} ${r.code||r.ticker||''}\n狀態：${lname(r.tradeLevel)}\n今日動作：${r.todayAction}\n關鍵價：頸線 ${v(r.neckline)}｜突破 ${v(r.entryBreakout)}｜回踩 ${v(r.entryPullback)}\n進場條件：收盤站上頸線至少2%、成交量達20日均量2倍、不可長上影、距離頸線5%內、隔日不跌破頸線。\n停損：${v(r.stopLoss)}\n目標：${v(r.target)}\n提醒：${r.tip}\n未確認前不追高。\n本內容為個人觀察與交易紀錄分享，不構成投資建議。`}async function copy(i){try{await navigator.clipboard.writeText(line(all[i]));document.getElementById('c'+i).textContent='已複製';setTimeout(()=>document.getElementById('c'+i).textContent='',1500)}catch(e){alert(line(all[i]))}}function card(r,i){let code=r.code||r.ticker||'';return`<div class="stock"><div class="head"><div><div class="name">${r.name||code} ${code}</div><div class="muted small">${r.marketName}｜現價 ${v(r.close)}${r.market==='US'?' 美元':' 元'}｜${v(r.date)}</div></div><span class="pill ${r.tradeLevel}">${lname(r.tradeLevel)}</span></div><div class="tip"><b>今日動作：</b>${r.todayAction}<br><span class="${r.tradeLevel==='FORBIDDEN'||r.tradeLevel==='STOP_LOSS'?'red':r.tradeLevel==='TAKE_PROFIT'?'warn':'ok'}">${r.tip}</span></div><div class="kv"><div>頸線<br><b>${v(r.neckline)}</b></div><div>突破價<br><b>${v(r.entryBreakout)}</b></div><div>停損<br><b>${v(r.stopLoss)}</b></div><div>目標<br><b>${v(r.target)}</b></div><div>量比<br><b>${vol(r).toFixed(2)}倍</b></div><div>距頸線<br><b>${n(r.distanceFromNecklinePct).toFixed(2)}%</b></div></div><div class="strategy">型態：${v(r.pattern)}｜${v(r.stage)}<br>原因：${v(r.reason||r.planStatus)}</div><button onclick="copy(${i})">複製 LINE 訊息</button><span id="c${i}" class="small ok"></span></div>`}function put(id,nid,arr){document.getElementById(nid).textContent=arr.length+' 檔';document.getElementById(id).innerHTML=arr.length?arr.map(x=>card(x,x._i)).join(''):'<div class="empty">目前沒有符合此分類的標的。</div>'}function meta(m,path){if(m&&m.err)return`<span class="red">讀取失敗</span><br>查無該日資料<br>目前嘗試讀取檔案：${path}`;return`更新：${m.updatedAt||m.updatedAtTW||'-'}<br>掃描：${m.scanUniverse||m.totalMaster||m.totalWatchlist||m.totalAnalyzed||'-'} 檔｜有效資料：${m.totalAnalyzed||0} 檔<br>3燈以上：${m.qualified3Plus||0}｜嚴格候選：${m.strictCandidates||0}`}async function j(path){let r=await fetch(path+'?ts='+Date.now());if(!r.ok)throw new Error(path);return r.json()}async function loadAll(){let tw,us;try{tw=await j('data/latest.json')}catch(e){tw={meta:{err:true},stocks:[]}}try{us=await j('data/us_latest.json')}catch(e){us={meta:{err:true},stocks:[]}}twMeta.innerHTML=meta(tw.meta,'data/latest.json');usMeta.innerHTML=meta(us.meta,'data/us_latest.json');all=[];(tw.stocks||[]).forEach(r=>{r.market='TW';r.marketName='台股';all.push(decide(r,'tw'))});(us.stocks||[]).forEach(r=>{r.market='US';r.marketName='美股';all.push(decide(r,'us'))});all.forEach((r,i)=>r._i=i);put('entryList','entryN',all.filter(r=>['ENTRY','HOLD'].includes(r.tradeLevel)).slice(0,10));put('testList','testN',all.filter(r=>r.tradeLevel==='TEST').slice(0,10));put('watchList','watchN',all.filter(r=>r.tradeLevel==='WATCH'&&r.score>=3).slice(0,10));put('profitList','profitN',all.filter(r=>r.tradeLevel==='TAKE_PROFIT').slice(0,10));put('forbiddenList','forbiddenN',all.filter(r=>['STOP_LOSS','FORBIDDEN'].includes(r.tradeLevel)).slice(0,10))}loadAll();</script></body></html>
